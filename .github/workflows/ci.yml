name: CI

# Run on every push and every pull request, so nothing reaches main unchecked.
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm

      - name: Install dependencies (from the lockfile)
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test
